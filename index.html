<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PLT Solutions — Premium product portfolio showcasing modern SaaS web applications built for enterprise and growth teams."
    />
    <meta property="og:title" content="PLT Solutions — Product Portfolio" />
    <meta
      property="og:description"
      content="Explore our portfolio of production-ready web applications — enterprise platforms, analytics dashboards, and developer tools."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#fafafa" />
    <script>
      ;(function () {
        var key = 'plt-theme'
        var stored = localStorage.getItem(key)
        var preference = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system'
        var dark =
          preference === 'dark' ||
          (preference === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
        var meta = document.querySelector('meta[name="theme-color"]')
        if (meta) meta.setAttribute('content', dark ? '#0a0a0b' : '#fafafa')
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>PLT Solutions — Product Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
